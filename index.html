<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Scheduled</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
</head>
<body>
  <div id="splash" class="splash"><img src="scheduled-splash.jpeg" alt="Scheduled"></div>
  <main id="app" class="app hidden">
    <section id="loginPage" class="login-card">
      <div class="brand"><img src="scheduled-icon.jpeg" alt="Scheduled"><h1>scheduled</h1><p>Tutoring, made simple.</p></div>
      <div id="notice" class="notice hidden"></div>
      <label>Email</label><input id="loginEmail" type="email" placeholder="name@example.com">
      <label>Password</label><input id="loginPassword" type="password" placeholder="Password">
      <button onclick="login()">Login</button>
      <p class="hint">Please log in using your assigned email and password.</p>
      <button class="ghost" onclick="toggleRequestAccess()">Request Access</button>
      <div id="requestAccess" class="hidden setup">
        <hr>
        <h3>Request Access</h3>
        <p class="hint">Submit your details. Admin will review your request and create your account if approved.</p>
        <input id="reqName" placeholder="Full name">
        <input id="reqEmail" type="email" placeholder="Email address">
        <input id="reqPhone" placeholder="Phone number">
        <input id="reqCourses" placeholder="Course(s) needed">
        <textarea id="reqMessage" placeholder="Message (optional)"></textarea>
        <button onclick="submitAccessRequest()">Submit Request</button>
      </div>
    </section>
    <section id="dashboard" class="hidden">
      <header class="topbar"><div><h1>Scheduled</h1><p id="roleLabel"></p></div><button class="ghost" onclick="logout()">Logout</button></header>
      <nav id="tabs" class="tabs"></nav>
      <section id="content" class="content"></section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
